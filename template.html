<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>{{TITLE}}</title>
<script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mermaid@10.9.1/dist/mermaid.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github.min.css"/>
<script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/highlight.min.js"></script>
<style>
  /* ── 设计令牌：对齐「全链路追踪」风格（Tailwind slate + 紫靛渐变） ── */
  :root {
    --sidebar: 290px;
    --c-bg:#f8f9fb; --c-surface:#ffffff; --c-border:#e2e8f0;
    --c-text:#1e293b; --c-muted:#94a3b8;
    --c-primary:#667eea; --c-primary2:#764ba2;
    --c-success:#22c55e; --c-warning:#f59e0b; --c-danger:#ef4444; --c-info:#0ea5e9;
    --code-bg:#f8f9fb; --radius:8px;
    --shadow:0 1px 3px rgba(0,0,0,0.06); --shadow-lg:0 4px 24px rgba(0,0,0,0.06);
    --grad:linear-gradient(135deg,#667eea,#764ba2);
  }
  * { box-sizing: border-box; }
  body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",Helvetica,Arial,sans-serif;
         color:var(--c-text); background:var(--c-bg); font-size:13px; line-height:1.55; }

  /* ── 侧边栏：白色卡面 + 紫靛渐变品牌头 ── */
  #sidebar { position:fixed; top:0; left:0; width:var(--sidebar); height:100vh; overflow-y:auto;
             background:var(--c-surface); border-right:1px solid var(--c-border); padding:0 0 20px; }
  #sidebar .brand { background:var(--grad); color:#fff; padding:15px 20px; font-size:16px;
                    font-weight:700; letter-spacing:.3px; position:sticky; top:0; z-index:1; }
  #sidebar .brand small { display:block; font-size:11px; font-weight:400; color:rgba(255,255,255,.82); margin-top:3px; }
  #sidebar ul { list-style:none; padding:8px 0; margin:0; }
  #sidebar li a { display:block; padding:6px 20px; color:var(--c-text); text-decoration:none;
                  font-size:13px; border-left:3px solid transparent; transition:all .15s; }
  #sidebar li a:hover { background:#f1f5f9; color:var(--c-primary); }
  #sidebar li a.active { background:#eef2ff; color:var(--c-primary); border-left-color:var(--c-primary); font-weight:600; }
  #sidebar .foot { padding:13px 20px; font-size:11px; color:var(--c-muted);
                   border-top:1px solid var(--c-border); margin-top:6px; }

  /* ── 内容区：浅灰背景上的白色卡片 ── */
  #main { margin-left:var(--sidebar); padding:20px 28px 100px; }
  #content { max-width:940px; margin:0 auto; background:var(--c-surface);
             border:1px solid var(--c-border); border-radius:12px; box-shadow:var(--shadow-lg);
             padding:22px 28px; }
  #content h1 { font-size:21px; margin-top:2px; padding-bottom:10px; border-bottom:2px solid var(--c-border);
                background:var(--grad); -webkit-background-clip:text; background-clip:text;
                -webkit-text-fill-color:transparent; }
  #content h2 { font-size:16px; margin-top:22px; padding-bottom:5px; border-bottom:1px solid var(--c-border); }
  #content h3 { font-size:14px; margin-top:16px; }
  #content p { margin:6px 0; }
  #content ul, #content ol { margin:6px 0; padding-left:20px; }
  #content li { margin:2px 0; }
  #content p, #content li { font-size:13px; }
  #content a { color:var(--c-primary); text-decoration:none; }
  #content a:hover { text-decoration:underline; }
  #content code { background:var(--code-bg); border:1px solid var(--c-border); padding:0 5px;
                  border-radius:4px; font-size:12px; color:#7c3aed;
                  font-family:"SF Mono",Menlo,Consolas,monospace; }
  #content pre { background:var(--code-bg); padding:12px 14px; border-radius:var(--radius); overflow-x:auto;
                 border:1px solid var(--c-border); margin:10px 0; }
  #content pre code { background:none; border:none; padding:0; font-size:12px; color:inherit; line-height:1.5; }
  #content blockquote { border-left:3px solid var(--c-primary); margin:10px 0; padding:7px 14px;
                        background:#f5f3ff; color:#4c1d95; border-radius:0 var(--radius) var(--radius) 0; font-size:13px; }
  #content table { border-collapse:collapse; width:100%; margin:12px 0; font-size:12px;
                   border:1px solid var(--c-border); border-radius:var(--radius); overflow:hidden; }
  #content th, #content td { border-bottom:1px solid var(--c-border); padding:5px 9px; text-align:left; }
  #content th { background:#f8f9fb; font-weight:600; white-space:nowrap; }
  #content tr:hover { background:#f1f5f9; }
  #content tbody tr:last-child td { border-bottom:none; }

  /* ── Mermaid 图：同色系主题 + 圆角 + 投影，更精致 ── */
  .mermaid { position:relative; text-align:center; margin:14px 0; background:linear-gradient(180deg,#fcfcfe,#f8f9fb);
             border:1px solid var(--c-border); border-radius:var(--radius); padding:14px 12px; }
  /* 右上角放大按钮 */
  .zoom-btn { position:absolute; top:8px; right:8px; z-index:2; width:26px; height:26px;
              display:flex; align-items:center; justify-content:center; padding:0;
              border:1px solid var(--c-border); border-radius:6px; background:rgba(255,255,255,.92);
              color:var(--c-muted); cursor:pointer; font-size:13px; line-height:1;
              opacity:0; transition:opacity .15s, color .15s, border-color .15s; box-shadow:var(--shadow); }
  .mermaid:hover .zoom-btn { opacity:1; }
  .zoom-btn:hover { color:var(--c-primary); border-color:var(--c-primary); }
  /* 放大浮层 lightbox */
  .zoom-modal { position:fixed; inset:0; z-index:200; background:rgba(15,23,42,.72);
                display:flex; flex-direction:column; backdrop-filter:blur(2px); }
  .zoom-modal[hidden] { display:none; }
  .zoom-toolbar { display:flex; gap:8px; justify-content:center; align-items:center; padding:12px; }
  .zoom-toolbar button { border:1px solid rgba(255,255,255,.3); background:rgba(255,255,255,.14);
                color:#fff; border-radius:6px; padding:6px 13px; font-size:13px; cursor:pointer; transition:background .15s; }
  .zoom-toolbar button:hover { background:rgba(255,255,255,.28); }
  .zoom-hint { color:rgba(255,255,255,.6); font-size:12px; margin-left:6px; }
  .zoom-stage { flex:1; overflow:auto; display:flex; align-items:flex-start; justify-content:center;
                padding:0 20px 24px; cursor:grab; }
  .zoom-stage.dragging { cursor:grabbing; }
  .zoom-stage svg { background:#fff; border-radius:8px; padding:18px; box-shadow:0 10px 50px rgba(0,0,0,.35); }
  .mermaid svg { max-width:100%; height:auto; }
  .mermaid .node rect, .mermaid .node polygon, .mermaid .node circle,
  .mermaid .node ellipse, .mermaid .node path { filter:drop-shadow(0 1px 2px rgba(15,23,42,.12)); }
  .mermaid .node rect, .mermaid .node polygon { rx:6px; ry:6px; }
  .mermaid .edgePath .path, .mermaid .flowchart-link { stroke-width:1.4px; }
  .mermaid .cluster rect { rx:8px; ry:8px; }
  .mermaid .edgeLabel, .mermaid .edgeLabel rect { fill:#fff; background:#fff; color:#475569; }
  .mermaid .actor { filter:drop-shadow(0 1px 2px rgba(15,23,42,.12)); }

  /* ── 顶部彩色统计条（绿/蓝/黄/红，对齐 trace 页 .scard） ── */
  .summary-bar { display:flex; gap:8px; margin:12px 0 16px; flex-wrap:wrap; }
  .scard { flex:1; min-width:78px; text-align:center; padding:7px 6px; border-radius:var(--radius);
           font-size:18px; font-weight:700; border:1px solid; line-height:1.1; }
  .scard small { display:block; font-size:10px; font-weight:400; color:var(--c-muted); margin-top:2px; }
  .sc-blue   { background:#eff6ff; border-color:#bfdbfe; color:#2563eb; }
  .sc-green  { background:#f0fdf4; border-color:#bbf7d0; color:#16a34a; }
  .sc-yellow { background:#fffbeb; border-color:#fde68a; color:#d97706; }
  .sc-red    { background:#fef2f2; border-color:#fecaca; color:#dc2626; }
  .sc-purple { background:#f5f3ff; border-color:#ddd6fe; color:#7c3aed; }

  /* ── 章节层级框体：实色扁标题栏（白字）+ 点击折叠，颜色随层级深度变化 ── */
  .sec { border:1px solid var(--c-border); border-radius:var(--radius);
         margin:9px 0; overflow:hidden; background:var(--c-surface); }
  .sec .sec { margin:7px 0; }
  .sec-head { display:flex; align-items:center; gap:7px; padding:0 12px;
              cursor:pointer; user-select:none; color:#fff; transition:filter .15s; }
  .sec-head:hover { filter:brightness(1.06); }
  #content .sec-head > h2, #content .sec-head > h3, #content .sec-head > h4,
  #content .sec-head > h5, #content .sec-head > h6 { margin:0; padding:0; border:none; flex:1;
              color:#fff; font-weight:600; line-height:1.1; }
  #content .sec-head > h2 { font-size:13px; }
  #content .sec-head > h3 { font-size:12.5px; }
  #content .sec-head > h4, #content .sec-head > h5, #content .sec-head > h6 { font-size:12px; }
  .fold-arrow { font-size:10px; color:rgba(255,255,255,.85); transition:transform .15s; flex:none; }
  .sec.collapsed .fold-arrow { transform:rotate(-90deg); }
  .sec-body { padding:6px 13px 10px; }
  .sec-body > :first-child { margin-top:6px; }
  .sec.collapsed > .sec-body { display:none; }
  .sec-l2 > .sec-head { background:#2563eb; }
  .sec-l3 > .sec-head { background:#16a34a; }
  .sec-l4 > .sec-head { background:#d97706; }
  .sec-l5 > .sec-head, .sec-l6 > .sec-head { background:#dc2626; }
  /* 展开 / 折叠全部 */
  .sec-ctrl { display:flex; gap:14px; margin:-4px 0 12px; }
  .sec-ctrl a { font-size:11px; color:var(--c-primary); cursor:pointer; user-select:none; }
  .sec-ctrl a:hover { text-decoration:underline; }

  /* ── 上一页 / 下一页：卡片按钮 ── */
  .pager { display:flex; justify-content:space-between; gap:12px; margin-top:28px; padding-top:16px;
           border-top:1px solid var(--c-border); }
  .pager a { font-size:13px; color:var(--c-primary); padding:7px 13px; border:1px solid var(--c-border);
             border-radius:var(--radius); background:var(--c-surface); box-shadow:var(--shadow); transition:all .15s; }
  .pager a:hover { border-color:var(--c-primary); background:#eef2ff; text-decoration:none; }

  #toggle { display:none; }
  @media (max-width: 820px) {
    #sidebar { transform:translateX(-100%); transition:transform .2s; z-index:50; box-shadow:var(--shadow-lg); }
    #sidebar.open { transform:translateX(0); }
    #main { margin-left:0; padding:64px 16px 80px; }
    #content { padding:24px 20px; border-radius:var(--radius); }
    #toggle { display:block; position:fixed; top:12px; left:12px; z-index:60; background:var(--grad);
              color:#fff; border:none; border-radius:var(--radius); padding:8px 12px; font-size:14px;
              cursor:pointer; box-shadow:var(--shadow); }
  }
</style>
</head>
<body>
  <button id="toggle">☰ 目录</button>
  <nav id="sidebar">
    <div class="brand">{{BRAND}}<small>{{SUBTITLE}}</small></div>
    <ul>{{NAV}}</ul>
    <div class="foot">{{FOOT}}</div>
  </nav>
  <div id="main"><article id="content">加载中…</article></div>

  <!-- 图片放大浮层 -->
  <div id="zoom-modal" class="zoom-modal" hidden>
    <div class="zoom-toolbar">
      <button type="button" data-z="out">－ 缩小</button>
      <button type="button" data-z="reset">重置</button>
      <button type="button" data-z="in">＋ 放大</button>
      <button type="button" data-z="close">✕ 关闭</button>
      <span class="zoom-hint">滚轮缩放 · 拖拽平移 · Esc 关闭</span>
    </div>
    <div class="zoom-stage" id="zoom-stage"></div>
  </div>

  {{PAGES}}

  <script>
  const FILE_TO_ID = {{FILE_TO_ID}};
  const PAGES = Array.from(document.querySelectorAll('script[type="text/markdown"]'))
                     .map(s => ({ id: s.dataset.id, md: s.textContent }));
  const NAV = Array.from(document.querySelectorAll('#sidebar a[data-target]'));
  const ORDER = NAV.map(a => a.dataset.target);

  mermaid.initialize({
    startOnLoad:false, securityLevel:'loose', theme:'base',
    themeVariables:{
      fontFamily:'-apple-system,"PingFang SC","Segoe UI",sans-serif', fontSize:'13px',
      primaryColor:'#eef2ff', primaryBorderColor:'#818cf8', primaryTextColor:'#1e293b',
      lineColor:'#94a3b8', secondaryColor:'#f0fdf4', secondaryBorderColor:'#86efac',
      tertiaryColor:'#fff7ed', tertiaryBorderColor:'#fdba74',
      clusterBkg:'#f8f9fb', clusterBorder:'#e2e8f0', titleColor:'#1e293b',
      edgeLabelBackground:'#ffffff',
      actorBkg:'#eef2ff', actorBorder:'#818cf8', actorTextColor:'#1e293b',
      signalColor:'#64748b', signalTextColor:'#334155',
      labelBoxBkgColor:'#eef2ff', labelBoxBorderColor:'#818cf8',
      noteBkgColor:'#fffbeb', noteBorderColor:'#fcd34d',
    },
    flowchart:{ htmlLabels:true, curve:'basis', padding:10, nodeSpacing:42, rankSpacing:46 },
    sequence:{ useMaxWidth:true, mirrorActors:false },
  });
  marked.setOptions({ gfm:true, breaks:false });

  function titleOf(id) {
    const a = NAV.find(x => x.dataset.target === id);
    return a ? a.textContent.trim() : id;
  }

  // 把平铺的 h2/h3/h4… 重组成按层级嵌套、可点击折叠的 <section> 框体
  function buildSections(root) {
    const LEVEL = { H2:2, H3:3, H4:4, H5:5, H6:6 };
    const nodes = Array.from(root.childNodes);
    const frag = document.createDocumentFragment();
    const stack = [];                                   // [{level, body}]
    const parent = () => stack.length ? stack[stack.length-1].body : frag;
    for (const node of nodes) {
      const lvl = LEVEL[node.tagName];                  // 标题 → 开新框；其余 → 进当前框
      if (lvl) {
        while (stack.length && stack[stack.length-1].level >= lvl) stack.pop();
        const sec = document.createElement('section');
        sec.className = 'sec sec-l' + lvl;
        const head = document.createElement('div');
        head.className = 'sec-head';
        const arrow = document.createElement('span');
        arrow.className = 'fold-arrow';
        arrow.textContent = '▾';
        head.appendChild(arrow);
        head.appendChild(node);                         // 标题进顶部色条标题栏
        const body = document.createElement('div');
        body.className = 'sec-body';
        sec.appendChild(head);
        sec.appendChild(body);
        head.addEventListener('click', () => sec.classList.toggle('collapsed'));
        parent().appendChild(sec);
        stack.push({ level: lvl, body });               // 后续内容进 body
      } else {
        parent().appendChild(node);
      }
    }
    root.innerHTML = '';
    root.appendChild(frag);
  }

  // ===== 图片放大浮层（缩放 / 平移） =====
  const zModal = document.getElementById('zoom-modal');
  const zStage = document.getElementById('zoom-stage');
  let zScale = 1, zBase = 1, zInit = 1;
  function zApply() {
    const svg = zStage.querySelector('svg');
    if (svg) { svg.style.width = (zBase * zScale) + 'px'; svg.style.height = 'auto'; }
  }
  function openZoom(svg) {
    zStage.innerHTML = '';
    const clone = svg.cloneNode(true);
    const vb = (clone.getAttribute('viewBox') || '').split(/\s+/).map(Number);
    const natW = (vb.length === 4 && vb[2]) ? vb[2] : (svg.getBoundingClientRect().width || 640);
    clone.style.maxWidth = 'none';
    clone.removeAttribute('width'); clone.removeAttribute('height');  // 由 viewBox 等比缩放
    zBase = natW;
    zModal.hidden = false;
    zStage.appendChild(clone);
    zInit = Math.max(0.6, Math.min((zStage.clientWidth - 56) / natW, 2.8));  // 打开即适度放大
    zScale = zInit; zApply();
    zStage.scrollLeft = Math.max(0, (zStage.scrollWidth - zStage.clientWidth) / 2);
  }
  function closeZoom() { zModal.hidden = true; zStage.innerHTML = ''; }
  zModal.addEventListener('click', e => {
    const act = e.target.dataset && e.target.dataset.z;
    if (act === 'in')         { zScale = Math.min(zScale * 1.25, 6);  zApply(); }
    else if (act === 'out')   { zScale = Math.max(zScale * 0.8, 0.3); zApply(); }
    else if (act === 'reset') { zScale = zInit; zApply(); }
    else if (act === 'close') { closeZoom(); }
  });
  document.addEventListener('keydown', e => { if (e.key === 'Escape' && !zModal.hidden) closeZoom(); });
  zStage.addEventListener('wheel', e => {
    e.preventDefault();
    zScale = e.deltaY < 0 ? Math.min(zScale * 1.1, 6) : Math.max(zScale * 0.9, 0.3);
    zApply();
  }, { passive:false });
  let zdrag = null;
  zStage.addEventListener('pointerdown', e => {
    zdrag = { x:e.clientX, y:e.clientY, l:zStage.scrollLeft, t:zStage.scrollTop,
              moved:false, onSvg:!!(e.target.closest && e.target.closest('svg')) };
    zStage.classList.add('dragging');
    try { zStage.setPointerCapture(e.pointerId); } catch (_) {}
  });
  zStage.addEventListener('pointermove', e => {
    if (!zdrag) return;
    if (Math.abs(e.clientX - zdrag.x) + Math.abs(e.clientY - zdrag.y) > 4) zdrag.moved = true;
    zStage.scrollLeft = zdrag.l - (e.clientX - zdrag.x);
    zStage.scrollTop  = zdrag.t - (e.clientY - zdrag.y);
  });
  zStage.addEventListener('pointerup', () => {
    if (zdrag && !zdrag.moved && !zdrag.onSvg) closeZoom();   // 点击空白处关闭
    zdrag = null; zStage.classList.remove('dragging');
  });

  async function render(id) {
    const page = PAGES.find(p => p.id === id) || PAGES[0];
    const content = document.getElementById('content');
    content.innerHTML = marked.parse(page.md);

    // 1) 把 ```mermaid 代码块转成 <div class="mermaid">
    content.querySelectorAll('pre > code.language-mermaid').forEach(code => {
      const div = document.createElement('div');
      div.className = 'mermaid';
      div.textContent = code.textContent;
      code.parentElement.replaceWith(div);
    });
    // 2) 渲染 mermaid
    try { await mermaid.run({ nodes: content.querySelectorAll('.mermaid') }); }
    catch (e) { console.warn('mermaid:', e); }
    // 2.5) 给每张图加右上角放大按钮
    content.querySelectorAll('.mermaid').forEach(box => {
      const svg = box.querySelector('svg');
      if (!svg || box.querySelector('.zoom-btn')) return;
      const btn = document.createElement('button');
      btn.type = 'button'; btn.className = 'zoom-btn'; btn.title = '点击放大'; btn.textContent = '🔍';
      btn.addEventListener('click', () => openZoom(svg));
      box.appendChild(btn);
    });
    // 3) 其余代码块高亮
    content.querySelectorAll('pre code:not(.language-mermaid)').forEach(el => {
      try { hljs.highlightElement(el); } catch(e) {}
    });
    // 3.5) 顶部彩色统计条 + 章节层级框体
    const stats = {
      h2:  content.querySelectorAll('h2').length,
      h3:  content.querySelectorAll('h3').length,
      dia: content.querySelectorAll('.mermaid').length,
      tbl: content.querySelectorAll('table').length,
    };
    buildSections(content);
    const bar = document.createElement('div');
    bar.className = 'summary-bar';
    bar.innerHTML =
      `<div class="scard sc-blue">${stats.h2}<small>章节</small></div>` +
      `<div class="scard sc-green">${stats.h3}<small>小节</small></div>` +
      `<div class="scard sc-yellow">${stats.dia}<small>图示</small></div>` +
      `<div class="scard sc-red">${stats.tbl}<small>表格</small></div>`;
    const h1 = content.querySelector('h1');
    if (h1) h1.insertAdjacentElement('afterend', bar);
    else content.insertBefore(bar, content.firstChild);
    const ctrl = document.createElement('div');
    ctrl.className = 'sec-ctrl';
    ctrl.innerHTML = `<a data-act="open">＋ 展开全部</a><a data-act="close">－ 折叠全部</a>`;
    ctrl.addEventListener('click', e => {
      const act = e.target.dataset.act;
      if (!act) return;
      content.querySelectorAll('.sec').forEach(s => s.classList.toggle('collapsed', act === 'close'));
    });
    bar.insertAdjacentElement('afterend', ctrl);
    // 4) 内部 .md 链接 → 切换页面
    content.querySelectorAll('a[href]').forEach(a => {
      const href = a.getAttribute('href');
      const m = href.match(/([^\/]+\.md)(#.*)?$/);
      if (m && FILE_TO_ID[m[1]]) {
        a.addEventListener('click', e => { e.preventDefault(); go(FILE_TO_ID[m[1]]); });
      }
    });
    // 5) 上一页 / 下一页
    const i = ORDER.indexOf(id);
    const pager = document.createElement('div');
    pager.className = 'pager';
    pager.innerHTML =
      (i > 0 ? `<a href="#" data-go="${ORDER[i-1]}">← ${titleOf(ORDER[i-1])}</a>` : '<span></span>') +
      (i < ORDER.length-1 ? `<a href="#" data-go="${ORDER[i+1]}">${titleOf(ORDER[i+1])} →</a>` : '<span></span>');
    content.appendChild(pager);
    pager.querySelectorAll('a[data-go]').forEach(a =>
      a.addEventListener('click', e => { e.preventDefault(); go(a.dataset.go); }));

    NAV.forEach(a => a.classList.toggle('active', a.dataset.target === id));
    document.getElementById('main').scrollTo(0,0);
    window.scrollTo(0,0);
  }

  function go(id) {
    if (location.hash !== '#'+id) location.hash = id;
    render(id);
    document.getElementById('sidebar').classList.remove('open');
  }

  NAV.forEach(a => a.addEventListener('click', e => { e.preventDefault(); go(a.dataset.target); }));
  window.addEventListener('hashchange', () => render((location.hash||'#home').slice(1)));
  document.getElementById('toggle').addEventListener('click', () =>
    document.getElementById('sidebar').classList.toggle('open'));

  render((location.hash||'#home').slice(1));
</script>
</body>
</html>
